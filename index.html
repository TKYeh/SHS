<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運動課程預約系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧘🧘‍♀️運動課程預約系統</h1>
            <p>輕鬆預約您的運動課程</p>
        </div>

        <div class="user-info" id="userInfo">
            <p>正在載入用戶資訊...</p>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="calendar">行事曆</div>
            <div class="tab" data-tab="courses">課程管理</div>
            <div class="tab" data-tab="reservations">我的預約</div>
        </div>

        <div id="calendarTab" class="tab-content active">
            <div class="calendar">
                <div class="calendar-header">
                    <button class="nav-btn" id="prevMonth">上個月</button>
                    <h2 id="currentMonth">2026年4月</h2>
                    <button class="nav-btn" id="nextMonth">下個月</button>
                </div>

                <div class="weekdays">
                    <div class="weekday">日</div>
                    <div class="weekday">一</div>
                    <div class="weekday">二</div>
                    <div class="weekday">三</div>
                    <div class="weekday">四</div>
                    <div class="weekday">五</div>
                    <div class="weekday">六</div>
                </div>

                <div class="days" id="calendarDays"></div>
            </div>
        </div>

        <div id="coursesTab" class="tab-content">
            <div class="tab-actions" style="display:none;">
                <button class="btn" id="openCreateCourseModal">+ 建立新課程</button>
            </div>
            <div class="course-list" id="coursesList">
                <div class="loading">載入中...</div>
            </div>
        </div>

        <div id="reservationsTab" class="tab-content">
            <div class="course-list" id="reservationsList">
                <div class="loading">載入中...</div>
            </div>
        </div>
    </div>

    <div id="createCourseModal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="createCourseModal">&times;</span>
            <h2>建立新課程</h2>
            <form id="createCourseForm">
                <div class="form-group">
                    <label>課程名稱：</label>
                    <input type="text" id="courseName" required>
                </div>
                <div class="form-group">
                    <label>日期：</label>
                    <input type="date" id="courseDate" required>
                </div>
                <div class="form-group">
                    <label>開始時間：</label>
                    <input type="time" id="startTime" required>
                </div>
                <div class="form-group">
                    <label>結束時間：</label>
                    <input type="time" id="endTime" required>
                </div>
                <div class="form-group">
                    <label>最大人數：</label>
                    <input type="number" id="maxStudents" min="1" max="50" required>
                </div>
                <button type="submit" class="btn">建立課程</button>
                <button type="button" class="btn btn-secondary" data-modal="createCourseModal">取消</button>
            </form>
        </div>
    </div>

    <div id="reserveModal" class="modal">
        <div class="modal-content">
            <span class="close" data-modal="reserveModal">&times;</span>
            <h2 id="reserveTitle">預約課程</h2>
            <div id="reserveContent">
                <p>載入中...</p>
            </div>
            <button id="confirmReserve" class="btn">確認預約</button>
            <button type="button" class="btn btn-secondary" data-modal="reserveModal">取消</button>
        </div>
    </div>

    <div id="cancelConfirmModal" class="modal">
        <div class="modal-content">
            <h2>確認取消預約</h2>
            <p>確定要取消此預約嗎？</p>
            <div class="modal-actions">
                <button id="confirmCancelBtn" class="btn btn-danger">確定取消</button>
                <button id="dismissCancelBtn" class="btn btn-secondary">保留預約</button>
            </div>
        </div>
    </div>

    <div id="waitlistConfirmModal" class="modal">
        <div class="modal-content">
            <h2>加入候補</h2>
            <p id="waitlistConfirmMessage">確定要加入候補名單嗎？</p>
            <div class="modal-actions">
                <button id="confirmWaitlistBtn" class="btn waitlist-btn">確定加入候補</button>
                <button id="dismissWaitlistBtn" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
